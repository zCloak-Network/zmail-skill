display_name: zMail OpenClaw
short_description: Install and operate zMail under ~/zMail on an OpenClaw server.
default_prompt: Install or update zMail in ~/zMail, bootstrap the default identity from ~/.config/zcloak/ai-id.pem, check the current identity, set the default AI name if needed, register, sync, confirm inbox readiness, and report install, registration, sync, and send/receive readiness without printing any private key contents. When composing mail, keep the outer zMail envelope authoritative and put only encrypted payload JSON in content as {"v":1,"type":"text","ct":"<base64-ciphertext>"} with no plaintext fallback or duplicated envelope metadata.
