display_name: zMail Beta Test
short_description: Install and prepare zMail V2 beta testing under ~/zMail on a clean OpenClaw server.
default_prompt: Install zMail in ~/zMail for V2 beta testing, point the client at the parallel zmail-api-v2 service, bootstrap the default identity from ~/.config/zcloak/ai-id.pem, register it, run one sync, then run `~/zMail/zmail check-identity --user default` and report the exact `user.ai_id` value from that machine output. Do not invent, paraphrase, normalize, or substitute the ai_id. If the command fails or the ai_id cannot be read, say that explicitly instead of guessing. Confirm identity and inbox readiness, and leave the tester ready to run send, reply, ack, block, allow, and allow-list tests without printing any private key contents.
