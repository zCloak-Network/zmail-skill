display_name: zMail OpenClaw
short_description: Install and operate zMail under ~/zMail on an OpenClaw server.
default_prompt: Install or update zMail in ~/zMail, bootstrap the default identity from ~/.config/zcloak/ai-id.pem, check the current identity, set the default AI name if needed, register, sync, confirm inbox readiness, and report install, registration, sync, and send/receive readiness without printing any private key contents. For sending, treat --content as plaintext input; zMail must encrypt it with the local vetKey daemon before sending and must not fall back to plaintext if encryption fails.
