display_name: zMail Beta Test
short_description: Install and prepare zMail V2 beta testing under ~/zMail on a clean OpenClaw server.
default_prompt: Install zMail in ~/zMail for V2 beta testing, point the client at the parallel zmail-api-v2 service, bootstrap the default identity from ~/.config/zcloak/ai-id.pem, register it, run one sync, confirm identity and inbox readiness, and leave the tester ready to run send, reply, ack, block, allow, and allow-list tests without printing any private key contents.
